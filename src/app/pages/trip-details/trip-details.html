<p class="error" *ngIf="errorMessage">
  {{ errorMessage }}
</p>

<div class="trip-details" *ngIf="trip() as selectedTrip">
  <img [src]="selectedTrip.image" [alt]="selectedTrip.name">

  <div class="content">
    <h2>{{ selectedTrip.name }}</h2>

    <p><strong>יעד:</strong> {{ selectedTrip.destination }}</p>
    <p><strong>תאריך:</strong> {{ selectedTrip.date }}</p>
    <p><strong>מחיר:</strong> {{ selectedTrip.price }} ₪</p>
    <p><strong>תיאור:</strong> {{ selectedTrip.description }}</p>

    <button routerLink="/home/trips-all">
      חזרה לכל הטיולים
    </button>
  </div>
</div>
