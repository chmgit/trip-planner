<p class="error" *ngIf="errorMessage">
  {{ errorMessage }}
</p>

<p class="success" *ngIf="successMessage">
  {{ successMessage }}
</p>

<div class="trip-details" *ngIf="trip() as selectedTrip">
  <img [src]="selectedTrip.image" [alt]="selectedTrip.name">

  <div class="content">
    <h2>{{ selectedTrip.name }}</h2>

    <p><strong>יעד:</strong> {{ selectedTrip.destination }}</p>
    <p><strong>תאריך:</strong> {{ selectedTrip.date }}</p>
    <p><strong>מחיר:</strong> {{ selectedTrip.price }} ₪</p>
    <p><strong>תיאור:</strong> {{ selectedTrip.description }}</p>

    <hr>

    <div class="booking-box" *ngIf="!isAlreadyBooked">
      <h3>הרשמה לטיול</h3>

      <label>כמות אנשים:</label>
      <input type="number" min="1" name="numberOfPeople" [(ngModel)]="numberOfPeople">

      <button (click)="registerToTrip()">
        הירשם
      </button>
    </div>

    <p class="already-booked" *ngIf="isAlreadyBooked">
      משתמש רשום כבר לטיול
    </p>

    <br>

    <button routerLink="/home/trips-all">
      חזרה לכל הטיולים
    </button>
  </div>
</div>
